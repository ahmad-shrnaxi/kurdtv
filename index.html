<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kurd TV Live</title>
    <style>
        body { font-family: sans-serif; background-color: #0f172a; color: white; text-align: center; margin: 0; padding: 20px; }
        .container { max-width: 1000px; margin: 0 auto; }
        .video-container { position: relative; padding-bottom: 56.25%; height: 0; overflow: hidden; background: #000; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        .video-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 12px; margin-top: 25px; }
        .btn { background: #1e293b; border: 1px solid #334155; color: white; padding: 12px; cursor: pointer; border-radius: 8px; font-weight: bold; transition: 0.2s; }
        .btn:hover { background: #38bdf8; color: #0f172a; }
    </style>
</head>
<body>

<div class="container">
    <h1 style="color: #38bdf8;">پەخشێ ڕاستەوخۆ یێ کەناڵان</h1>
    <p>کەناڵێ خۆ هەڵبژێرە بۆ تەماشاکرنێ</p>
    
    <div class="video-container">
        <iframe id="main-player" src="https://www.youtube.com/embed/n4_8LdY-p8M" allowfullscreen></iframe>
    </div>

    <div class="grid">
        <button class="btn" onclick="change('https://www.youtube.com/embed/n4_8LdY-p8M')">Kurdistan 24</button>
        <button class="btn" onclick="change('https://www.youtube.com/embed/yF8zNf-48g0')">Rudaw TV</button>
        <button class="btn" onclick="change('https://www.youtube.com/embed/bNyUyrR0PHo')">Al Jazeera (ar)</button>
        <button class="btn" onclick="change('https://www.youtube.com/embed/J78S_uX8CqU')">TRT World</button>
    </div>
</div>

<script>
    function change(embedUrl) {
        document.getElementById('main-player').src = embedUrl;
    }
</script>

</body>
</html>
