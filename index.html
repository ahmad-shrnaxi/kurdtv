<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kurd & World Premium TV</title>
    <link href="https://vjs.zencdn.net/7.20.3/video-js.css" rel="stylesheet" />
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #0b0f19; color: #f8fafc; margin: 0; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; }
        h1 { color: #38bdf8; margin-bottom: 5px; }
        
        .main-layout { display: flex; flex-direction: column; gap: 20px; margin-top: 20px; }
        @media (min-width: 768px) { .main-layout { flex-direction: row; } }
        
        .player-section { flex: 2; background: #1e293b; padding: 15px; border-radius: 12px; }
        .video-wrapper { width: 100%; aspect-ratio: 16/9; background: #000; border-radius: 8px; overflow: hidden; }
        
        .playlist-section { flex: 1; background: #1e293b; padding: 15px; border-radius: 12px; display: flex; flex-direction: column; max-height: 600px; }
        .search-box { width: 100%; padding: 12px; background: #0f172a; border: 1px solid #334155; color: white; border-radius: 6px; margin-bottom: 15px; box-sizing: border-box; text-align: right; }
        
        .channel-list { overflow-y: auto; flex-grow: 1; display: flex; flex-direction: column; gap: 8px; padding-left: 5px; }
        .channel-item { background: #334155; border: 1px solid #475569; color: white; padding: 12px; text-align: right; border-radius: 6px; cursor: pointer; transition: 0.2s; font-weight: 500; }
        .channel-item:hover { background: #38bdf8; color: #0f172a; }
        
        #current-title { margin-top: 10px; font-size: 18px; color: #38bdf8; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h1>پەخشێ شاهانە یێ کەناڵێن کوردی و جیهانی</h1>
    <p>پتر ژ ۱۰۰۰ کەناڵێن لایڤ ب شێوەیێ ڕاستەوخۆ</p>

    <div class="main-layout">
        <div class="player-section">
            <div id="player-container" class="video-wrapper">
                <video id="live-player" class="video-js vjs-default-skin vjs-big-play-centered" controls preload="auto" width="100%" height="100%">
                    <source src="https://live.france24.com/france24/en/vdo_en.m3u8" type="application/x-mpegURL">
                </video>
            </div>
            <div id="current-title">کەناڵێ نوکە: France 24 Live</div>
        </div>

        <div class="playlist-section">
            <input type="text" id="search" class="search-box" placeholder="ل ڤێرێ گەڕیانێ د ناڤ کەناڵان دا بکە..." oninput="filterChannels()">
            <div class="channel-list" id="channel-box">
                <div class="channel-item" onclick="playLive('https://live.france24.com/france24/en/vdo_en.m3u8', 'France 24')">🌍 France 24 English</div>
                <div class="channel-item" onclick="playLive('https://live.france24.com/france24/ar/vdo_ar.m3u8', 'Fracne 24 Arabic')">🌍 فرانس ٢٤ العربية</div>
                </div>
        </div>
    </div>
</div>

<script src="https://vjs.zencdn.net/7.20.3/video.js"></script>
<script>
    let player = videojs('live-player');
    let allChannels = [];

    // لۆدکرنا لیستا مەزن یا کەناڵێن جیهانی ب شێوەیەکێ خۆکار (Auto Load)
    // ئەڤ لینکه پتر ژ 8000 کەناڵێن لایڤ یێن جیهانی تێدانە
    fetch('https://iptv-org.github.io/iptv/index.m3u')
        .then(response => response.text())
        .then(data => {
            parseM3U(data);
        }).catch(err => console.log("Error loading channels"));

    function parseM3U(data) {
        const lines = data.split('\n');
        let currentChannel = {};
        
        for (let i = 0; i < lines.length; i++) {
            let line = lines[i].trim();
            if (line.startsWith('#EXTINF:')) {
                let name = line.split(',')[1];
                currentChannel = { name: name };
            } else if (line.startsWith('http')) {
                currentChannel.url = line;
                allChannels.push(currentChannel);
            }
        }
        renderChannels(allChannels.slice(0, 1500)); // لۆدکرنا 1500 کەناڵێن یەکەم بۆ خێرایی
    }

    function renderChannels(channels) {
        const box = document.getElementById('channel-box');
        // هێلانا کەناڵێن سەرەکی و زێدەکرنا یێن نوو
        let html = box.innerHTML; 
        channels.forEach(ch => {
            if(ch.name && ch.url) {
                html += `<div class="channel-item" onclick="playLive('${ch.url}', '${ch.name}')">📺 ${ch.name}</div>`;
            }
        });
        box.innerHTML = html;
    }

    function playLive(url, name) {
        document.getElementById('current-title').innerText = "کەناڵێ نوکە: " + name;
        player.src({ src: url, type: 'application/x-mpegURL' });
        player.play();
    }

    // سیستەمێ گەڕیانێ (Search)
    function filterChannels() {
        let query = document.getElementById('search').value.toLowerCase();
        let items = document.querySelectorAll('.channel-item');
        items.forEach(item => {
            if(item.innerText.toLowerCase().includes(query)) {
                item.style.display = "block";
            } else {
                item.style.display = "none";
            }
        });
    }
</script>

</body>
</html>
