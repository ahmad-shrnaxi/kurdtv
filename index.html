<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KURDtv - پلاتفۆرمێ شاهانە یێ کەناڵێن کوردی و جیهانی</title>
    <link href="https://vjs.zencdn.net/7.20.3/video-js.css" rel="stylesheet" />
    <style>
        :root {
            --bg-color: #05070c;
            --card-bg: rgba(17, 24, 39, 0.85); /* پاشبنەمایا شووشەیی */
            --kurd-red: #ef4444;
            --kurd-green: #10b981;
            --kurd-gold: #f59e0b;
            --text-color: #f3f4f6;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(rgba(5, 7, 12, 0.8), rgba(5, 7, 12, 0.95)), 
                        url('https://images.unsplash.com/photo-1628155930542-3c7a64e2c833?auto=format&fit=crop&w=1600&q=80') no-gradient;
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: var(--text-color);
            margin: 0;
            padding: 20px;
        }
        
        .container { max-width: 1400px; margin: 0 auto; }
        
        /* سەرێ لاپەڕەی دگەل لۆگۆیێ نوو یێ KURDtv */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 20px 30px;
            background: linear-gradient(135deg, rgba(30, 27, 75, 0.9), rgba(15, 23, 42, 0.9));
            backdrop-filter: blur(10px);
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.7);
            margin-bottom: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            position: relative;
        }
        .header::before {
            content: ''; position: absolute; top: 0; left: 0; right: 0; height: 4px;
            background: linear-gradient(to right, var(--kurd-red), var(--kurd-gold), var(--kurd-green));
            border-radius: 16px 16px 0 0;
        }

        /* دروستکرنا لۆگۆیێ KURDtv ب شێوازەکێ نەئۆنی یێ پڕۆفیشناڵ */
        .logo-container {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .kurd-logo {
            font-size: 32px;
            font-weight: 900;
            letter-spacing: 1px;
            background: linear-gradient(to right, #fff, var(--kurd-gold));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            position: relative;
            display: flex;
            align-items: center;
        }
        .kurd-logo span {
            color: var(--kurd-red);
            -webkit-text-fill-color: var(--kurd-red);
        }
        .sun-icon {
            width: 35px;
            height: 35px;
            background: radial-gradient(circle, #fffb00 20%, #f59e0b 70%);
            border-radius: 50%;
            box-shadow: 0 0 15px #f59e0b;
            position: relative;
        }

        .header-info { text-align: left; }
        .header-info p { margin: 0; color: var(--kurd-gold); font-weight: 600; font-size: 14px; }

        .main-layout { display: flex; flex-direction: column; gap: 25px; }
        @media (min-width: 992px) { .main-layout { flex-direction: row; } }

        /* شاشا ڤیدیۆیێ */
        .player-section { flex: 2; background: var(--card-bg); backdrop-filter: blur(8px); padding: 20px; border-radius: 16px; border: 1px solid rgba(255,255,255,0.05); display: flex; flex-direction: column; justify-content: center; }
        .video-wrapper { width: 100%; aspect-ratio: 16/9; background: #000; border-radius: 12px; overflow: hidden; box-shadow: 0 15px 35px rgba(0,0,0,0.9); border: 1px solid #374151; position: relative; }
        .video-wrapper iframe, .video-wrapper video { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; display: block; }
        
        #current-title { margin-top: 15px; font-size: 20px; color: var(--kurd-gold); font-weight: bold; text-align: right; background: rgba(31, 41, 55, 0.8); padding: 10px 15px; border-radius: 8px; border-right: 4px solid var(--kurd-red); }

        /* بەشێ کەتەلۆگێ وڵاتان */
        .sidebar-section { flex: 1.2; background: var(--card-bg); backdrop-filter: blur(8px); padding: 20px; border-radius: 16px; border: 1px solid rgba(255,255,255,0.05); display: flex; flex-direction: column; max-height: 850px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
        
        /* سندوقا گەڕیانێ */
        .search-box { width: 100%; padding: 14px 18px; background: rgba(11, 15, 23, 0.9); border: 1px solid #374151; color: white; border-radius: 10px; margin-bottom: 15px; box-sizing: border-box; text-align: right; font-size: 15px; }

        /* سندوقا گشتی یا دەوڵەتان */
        .tabs-title { font-size: 14px; color: var(--kurd-gold); margin-bottom: 8px; font-weight: bold; text-align: right; }
        .tabs { 
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-bottom: 15px;
            background: rgba(11, 15, 23, 0.8);
            padding: 10px;
            border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.05);
            max-height: 200px;
            overflow-y: auto;
        }
        
        .tab-btn { 
            background: #1f2937; 
            border: 1px solid #374151; 
            color: #f3f4f6; 
            padding: 8px 14px; 
            border-radius: 6px; 
            cursor: pointer; 
            font-weight: bold; 
            font-size: 13px; 
            transition: 0.2s;
            text-align: center;
        }
        .tab-btn.active, .tab-btn:hover { 
            background: var(--kurd-gold); 
            color: #000; 
            border-color: var(--kurd-gold); 
        }

        /* لیستا کەناڵان */
        .channel-list { overflow-y: auto; flex-grow: 1; display: flex; flex-direction: column; gap: 10px; height: 420px; }
        .channel-list::-webkit-scrollbar { width: 6px; }
        .channel-list::-webkit-scrollbar-thumb { background: #374151; border-radius: 10px; }
        .channel-item { display: flex; align-items: center; justify-content: space-between; background: rgba(31, 41, 55, 0.7); border: 1px solid rgba(255,255,255,0.05); color: white; padding: 14px; text-align: right; border-radius: 10px; cursor: pointer; transition: 0.2s; }
        .channel-item:hover { background: rgba(45, 55, 72, 0.9); border-color: var(--kurd-gold); }
        
        .badge { font-size: 11px; padding: 4px 10px; border-radius: 6px; font-weight: bold; white-space: nowrap; }
        .badge-kurd { background: linear-gradient(45deg, var(--kurd-red), var(--kurd-gold)); color: white; }
        .badge-global { background: #4b5563; color: white; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div class="logo-container">
            <div class="sun-icon"></div>
            <div class="kurd-logo">KURD<span>tv</span></div>
        </div>
        <div class="header-info">
            <p>پەخشێ جیهانی یێ فەرمی</p>
        </div>
    </div>

    <div class="main-layout">
        <div class="player-section">
            <div id="player-container" class="video-wrapper">
                <iframe id="yt-player" src="https://www.youtube.com/embed/yF8zNf-48g0" allowfullscreen></iframe>
            </div>
            <div id="current-title">کەناڵێ نوکە: Rudaw TV Live</div>
        </div>

        <div class="sidebar-section">
            <input type="text" id="search" class="search-box" placeholder="ناڤێ کەناڵی بنڤێسە..." oninput="filterChannels()">
            
            <div class="tabs-title">لیستا گشتی یا دەوڵەتێن جیهانێ:</div>
            <div class="tabs" id="countries-bar">
                <button class="tab-btn active" onclick="switchTab('all', this)">🌍 هەمی کەناڵ</button>
                <button class="tab-btn" onclick="switchTab('kurd', this)">☀️ کوردستان (ناوخۆ)</button>
            </div>

            <div class="channel-list" id="channel-box">
                <div class="channel-item" data-country="kurd" onclick="playLive('https://www.youtube.com/embed/yF8zNf-48g0', 'Rudaw TV Live', true)"><span>📺 Rudaw TV</span> <span class="badge badge-kurd">ناوخۆ</span></div>
                <div class="channel-item" data-country="kurd" onclick="playLive('https://www.youtube.com/embed/n4_8LdY-p8M', 'Kurdistan 24 Live', true)"><span>📺 Kurdistan 24</span> <span class="badge badge-kurd">ناوخۆ</span></div>
                <div class="channel-item" data-country="kurd" onclick="playLive('https://www.youtube.com/embed/hd_S3b8F_M0', 'Waar TV Live', true)"><span>📺 Waar TV</span> <span class="badge badge-kurd">ناوخۆ</span></div>
                <div class="channel-item" data-country="kurd" onclick="playLive('https://www.youtube.com/embed/V6W3o-GfP98', 'Gali Kurdistan Live', true)"><span>📺 Gali Kurdistan</span> <span class="badge badge-kurd">ناوخۆ</span></div>
                <div class="channel-item" data-country="kurd" onclick="playLive('https://www.youtube.com/embed/xLzYhY7P_iI', 'Zagros TV Live', true)"><span>📺 Zagros TV</span> <span class="badge badge-kurd">ناوخۆ</span></div>
                <div class="channel-item" data-country="kurd" onclick="playLive('https://www.youtube.com/embed/Z8p0mY9b5pA', 'Ava Entertainment Live', true)"><span>📺 Ava TV</span> <span class="badge badge-kurd">ناوخۆ</span></div>
                <div class="channel-item" data-country="kurd" onclick="playLive('https://www.youtube.com/embed/Uv4FpCq7pC4', 'Kurdstat TV Live', true)"><span>📺 Kurdstat</span> <span class="badge badge-kurd">ناوخۆ</span></div>
                <div class="channel-item" data-country="kurd" onclick="playLive('https://www.youtube.com/embed/o0kR6B-6v3o', 'Speda TV Live', true)"><span>📺 Speda TV</span> <span class="badge badge-kurd">ناوخۆ</span></div>
                <div class="channel-item" data-country="kurd" onclick="playLive('https://www.youtube.com/embed/v9C2oQ7_O4k', 'Payam TV Live', true)"><span>📺 Payam TV</span> <span class="badge badge-kurd">ناوخۆ</span></div>
                <div class="channel-item" data-country="kurd" onclick="playLive('https://www.youtube.com/embed/tMdfpAAnpIQ', 'NRT HD Live', true)"><span>📺 NRT TV</span> <span class="badge badge-kurd">ناوخۆ</span></div>
                <div class="channel-item" data-country="kurd" onclick="playLive('https://www.youtube.com/embed/J7_YitU_V0Y', 'Kurdistan TV Live', true)"><span>📺 Kurdistan TV</span> <span class="badge badge-kurd">ناوخۆ</span></div>
            </div>
        </div>
    </div>
</div>

<script src="https://vjs.zencdn.net/7.20.3/video.js"></script>
