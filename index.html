<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KURD tv - Mega Premium IPTV Platform</title>
    <!-- لۆدکرنا پلەیەرێ پیشەیی یێ IPTV -->
    <link href="https://vjs.zencdn.net/7.20.3/video-js.css" rel="stylesheet" />
    <style>
        :root {
            --bg-color: #05070c;
            --card-bg: rgba(17, 24, 39, 0.85);
            --kurd-red: #ef4444;
            --kurd-green: #10b981;
            --kurd-gold: #f59e0b;
            --text-color: #f3f4f6;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(rgba(5, 7, 12, 0.82), rgba(5, 7, 12, 0.96)), 
                        url('https://images.unsplash.com/photo-1628155930542-3c7a64e2c833?auto=format&fit=crop&w=1600&q=80') no-repeat;
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            user-select: none; /* ڕێگری ل کۆپیکرنا بێدەسەڵات دکەت */
        }
        
        .container { max-width: 1400px; margin: 0 auto; }
        
        /* سەرێ لاپەڕەی */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 20px 30px;
            background: linear-gradient(135deg, rgba(30, 27, 75, 0.9), rgba(15, 23, 42, 0.9));
            backdrop-filter: blur(10px);
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.7);
            margin-bottom: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            position: relative;
        }
        .header::before {
            content: ''; position: absolute; top: 0; left: 0; right: 0; height: 4px;
            background: linear-gradient(to right, var(--kurd-red), var(--kurd-gold), var(--kurd-green));
            border-radius: 16px 16px 0 0;
        }

        /* لۆگۆیێ KURD tv */
        .logo-container { display: flex; align-items: center; gap: 10px; }
        .kurd-logo {
            font-size: 32px; font-weight: 900; letter-spacing: 1px;
            background: linear-gradient(to right, #fff, var(--kurd-gold));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            display: flex; align-items: center; gap: 6px;
        }
        .kurd-logo span { color: var(--kurd-red); -webkit-text-fill-color: var(--kurd-red); text-transform: lowercase; }
        .sun-icon { width: 35px; height: 35px; background: radial-gradient(circle, #fffb00 20%, #f59e0b 70%); border-radius: 50%; box-shadow: 0 0 15px #f59e0b; }

        .header-actions { display: flex; align-items: center; gap: 15px; }
        .add-channel-btn {
            background: linear-gradient(45deg, var(--kurd-green), #059669);
            color: white; border: none; width: 45px; height: 45px; border-radius: 50%;
            font-size: 24px; font-weight: bold; cursor: pointer; display: flex;
            align-items: center; justify-content: center; box-shadow: 0 0 15px rgba(16, 185, 129, 0.4);
            transition: 0.2s;
        }
        .add-channel-btn:hover { transform: scale(1.1); box-shadow: 0 0 20px rgba(16, 185, 129, 0.7); }

        .main-layout { display: flex; flex-direction: column; gap: 25px; }
        @media (min-width: 992px) { .main-layout { flex-direction: row; } }

        /* شاشا ڤیدیۆیێ */
        .player-section { flex: 2; background: var(--card-bg); backdrop-filter: blur(8px); padding: 20px; border-radius: 16px; border: 1px solid rgba(255,255,255,0.05); display: flex; flex-direction: column; justify-content: center; }
        .video-wrapper { width: 100%; aspect-ratio: 16/9; background: #000; border-radius: 12px; overflow: hidden; box-shadow: 0 15px 35px rgba(0,0,0,0.9); border: 1px solid #374151; position: relative; }
        .video-wrapper iframe, .video-wrapper video { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; display: block; }
        
        #current-title { margin-top: 15px; font-size: 20px; color: var(--kurd-gold); font-weight: bold; text-align: right; background: rgba(31, 41, 55, 0.8); padding: 10px 15px; border-radius: 8px; border-right: 4px solid var(--kurd-red); }

        /* بەشێ کەتەلۆگێ وڵاتان */
        .sidebar-section { flex: 1.2; background: var(--card-bg); backdrop-filter: blur(8px); padding: 20px; border-radius: 16px; border: 1px solid rgba(255,255,255,0.05); display: flex; flex-direction: column; max-height: 850px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
        
        /* سندوقا گەڕیانێ */
        .search-box { width: 100%; padding: 14px 18px; background: rgba(11, 15, 23, 0.9); border: 1px solid #374151; color: white; border-radius: 10px; margin-bottom: 15px; box-sizing: border-box; text-align: right; font-size: 15px; }

        /* سندوقا گشتی یا دەوڵەتان */
        .tabs-title { font-size: 14px; color: var(--kurd-gold); margin-bottom: 8px; font-weight: bold; text-align: right; }
        .tabs { 
            display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 15px;
            background: rgba(11, 15, 23, 0.8); padding: 10px; border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.05); max-height: 140px; overflow-y: auto;
        }
        
        .tab-btn { 
            background: #1f2937; border: 1px solid #374151; color: #f3f4f6; padding: 8px 14px; 
            border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 13px; transition: 0.2s; text-align: center;
        }
        .tab-btn.active, .tab-btn:hover { background: var(--kurd-gold); color: #000; border-color: var(--kurd-gold); }

        /* لیستا کەناڵان */
        .channel-list { overflow-y: auto; flex-grow: 1; display: flex; flex-direction: column; gap: 10px; height: 450px; }
        .channel-list::-webkit-scrollbar { width: 6px; }
        .channel-list::-webkit-scrollbar-thumb { background: #374151; border-radius: 10px; }
        .channel-item { display: flex; align-items: center; justify-content: space-between; background: rgba(31, 41, 55, 0.7); border: 1px solid rgba(255,255,255,0.05); color: white; padding: 14px; text-align: right; border-radius: 10px; cursor: pointer; transition: 0.15s; position: relative; }
        .channel-item:hover { background: rgba(45, 55, 72, 0.9); border-color: var(--kurd-gold); }
        
        .badge { font-size: 11px; padding: 4px 10px; border-radius: 6px; font-weight: bold; white-space: nowrap; }
        .badge-kurd { background: linear-gradient(45deg, var(--kurd-red), var(--kurd-gold)); color: white; }
        .badge-global { background: #4b5563; color: white; }
        .badge-user { background: linear-gradient(45deg, #a855f7, #ec4899); color: white; }
        .badge-sport { background: linear-gradient(45deg, #0284c7, #06b6d4); color: white; }
        
        .loading-text { text-align: center; color: var(--kurd-gold); font-size: 13px; font-weight: bold; padding: 5px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div class="logo-container">
            <div class="sun-icon"></div>
            <div class="kurd-logo">KURD <span>tv</span></div>
        </div>
        <div class="header-actions">
            <button class="add-channel-btn" onclick="addNewChannelPrompt()" title="زێدەکرنا کەناڵێ نوو">+</button>
        </div>
    </div>

    <div class="main-layout">
        <div class="player-section">
            <div id="player-container" class="video-wrapper">
                <iframe id="yt-player" src="https://www.youtube.com/embed/yF8zNf-48g0" allowfullscreen></iframe>
            </div>
            <div id="current-title">کەناڵێ نوکە: Rudaw TV Live</div>
        </div>

        <div class="sidebar-section">
            <input type="text" id="search" class="search-box" placeholder="ناڤێ کەناڵی ل ڤێرێ بگەڕێ (وەک: Bein, Sport)..." oninput="filterChannels()">
            
            <div class="tabs-title">لیستا وڵاتێن جیهانێ:</div>
            <div class="tabs" id="countries-bar">
                <button class="tab-btn active" onclick="switchTab('all', this)">🌍 هەمی کەناڵ</button>
                <button class="tab-btn" onclick="switchTab('sport', this)">⚽ وەرزشی و Bein</button>
                <button class="tab-btn" onclick="switchTab('kurd', this)">☀️ کوردستان (ناوخۆ)</button>
                <button class="tab-btn" onclick="switchTab('user-added', this)">⭐ یێن من زێدەکرین</button>
            </div>

            <div id="loading-status" class="loading-text">خۆکار لۆدکرنا ١٠,٠٠٠+ کەناڵێن جیهانی و بین سبۆرت...</div>

            <div class="channel-list" id="channel-box">
                <!-- کەناڵێن ناوخۆیی یێن جێگیرکری -->
                <div class="channel-item" data-country="kurd" onclick="playLive('https://www.youtube.com/embed/yF8zNf-48g0', 'Rudaw TV Live', true)"><span>📺 Rudaw TV</span> <span class="badge badge-kurd">ناوخۆ</span></div>
                <div class="channel-item" data-country="kurd" onclick="playLive('https://www.youtube.com/embed/n4_8LdY-p8M', 'Kurdistan 24 Live', true)"><span>📺 Kurdistan 24</span> <span class="badge badge-kurd">ناوخۆ</span></div>
                <div class="channel-item" data-country="kurd" onclick="playLive('https://www.youtube.com/embed/hd_S3b8F_M0', 'Waar TV Live', true)"><span>📺 Waar TV</span> <span class="badge badge-kurd">ناوخۆ</span></div>
                <div class="channel-item" data-country="kurd" onclick="playLive('https://www.youtube.com/embed/V6W3o-GfP98', 'Gali Kurdistan Live', true)"><span>📺 Gali Kurdistan</span> <span class="badge badge-kurd">ناوخۆ</span></div>
                <div class="channel-item" data-country="kurd" onclick="playLive('https://www.youtube.com/embed/xLzYhY7P_iI', 'Zagros TV Live', true)"><span>📺 Zagros TV</span> <span class="badge badge-kurd">ناوخۆ</span></div>
            </div>
        </div>
    </div>
</div>

<script src="https://vjs.zencdn.net/7.20.3/video.js"></script>
<script>
    let player = null;
    let currentCountryCode = 'all';

    const countryTranslations = {
        'us': '🇺🇸 ئەمریکا', 'it': '🇮🇹 ئیتالیا', 'in': '🇮🇳 هیندستان', 'fr': '🇫🇷 فڕەنسا', 
        'de': '🇩🇪 ئەڵمانیا', 'tr': '🇹🇷 تورکیا', 'iq': '🇮🇶 عێراق', 'sa': '🇸🇦 سعوودیە', 
        'ae': '🇦🇪 ئیمارات', 'uk': '🇬🇧 بەریتانیا', 'es': '🇪🇸 ئیسپانیا'
    };

    function playLive(url, name, isYoutube) {
        document.getElementById('current-title').innerText = "کەناڵێ نوکە: " + name;
        const container = document.getElementById('player-container');
        
        if (isYoutube) {
            if(player) { player.dispose(); player = null; }
            container.innerHTML = `<iframe id="yt-player" src="${url}?autoplay=1" allowfullscreen allow="autoplay"></iframe>`;
        } else {
            container.innerHTML = `
                <video id="live-player" class="video-js vjs-default-skin" controls preload="auto" width="100%" height="100%">
                    <source src="${url}" type="application/x-mpegURL">
                </video>`;
            player = videojs('live-player');
            player.play();
        }
    }

    function switchTab(countryCode, btn) {
        currentCountryCode = countryCode;
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        filterChannels();
    }

    function filterChannels() {
        let query = document.getElementById('search').value.toLowerCase();
        let items = document.querySelectorAll('.channel-item');
        
        items.forEach(item => {
            let country = item.getAttribute('data-country');
            let text = item.innerText.toLowerCase();
            
            let matchesCountry = (currentCountryCode === 'all' || country === currentCountryCode);
            let matchesSearch = text.includes(query);
            
            item.style.display = (matchesCountry && matchesSearch) ? "flex" : "none";
        });
    }

    // زێدەکرنا خێرا
    function addNewChannelPrompt() {
        let name = prompt("ناڤێ کەناڵێ نوو بنڤێسه:");
        if (!name) return;
        
        let url = prompt("لینکێ کەناڵی (m3u8 یان یوتیوب) دابنی:");
        if (!url) return;

        let isYoutube = url.includes("youtube.com") || url.includes("youtu.be");
        if (isYoutube && !url.includes("embed/")) {
            let videoId = "";
            if (url.includes("v=")) videoId = url.split("v=")[1].split("&")[0];
            else if (url.includes("youtu.be/")) videoId = url.split("youtu.be/")[1].split("?")[0];
            if (videoId) url = `https://www.youtube.com/embed/${videoId}`;
        }

        let id = 'ch_' + Date.now(); // پێدانا ناسنامەکا جیاواز بۆ هەر کەناڵەکێ
        let newChannel = { id: id, name: name, url: url, isYoutube: isYoutube };
        
        let savedChannels = JSON.parse(localStorage.getItem('user_channels')) || [];
        savedChannels.push(newChannel);
        localStorage.setItem('user_channels', JSON.stringify(savedChannels));
        
        renderUserChannel(newChannel);
    }

    // دروستکرنا کەناڵێن دەستکاریکری ب سیستەمێ کلیکا درێژ یان کلیکا ڕاستێ (بێ دوگما X)
    function renderUserChannel(ch) {
        const box = document.getElementById('channel-box');
        const div = document.createElement('div');
        div.className = 'channel-item';
        div.setAttribute('data-country', 'user-added');
        div.setAttribute('id', ch.id);
        div.innerHTML = `<span>📺 ${ch.name}</span> <span class="badge badge-user">زێدەکری</span>`;
        
        // ڕووداوێ لێدانێ ب کلیکا ئاسایی
        div.addEventListener('click', function() {
            playLive(ch.url, ch.name, ch.isYoutube);
        });

        // سیستەمێ ژێبرنا پاراستی ب کلیکا ڕاستێ (ContextMenu)
        div.addEventListener('contextmenu', function(e) {
            e.preventDefault();
            confirmDeleteChannel(ch.id, ch.name);
        });

        // سیستەمێ ژێبرنا پاراستی ب کلیکا درێژ (Long Press) بۆ مۆبایلان
        let pressTimer;
        div.addEventListener('touchstart', function() {
            pressTimer = setTimeout(function() {
                confirmDeleteChannel(ch.id, ch.name);
            }, 1500); //گرتن بۆ چرکە و نیڤەکێ
        });
        div.addEventListener('touchend', function() { clearTimeout(pressTimer); });

        box.insertBefore(div, box.firstChild);
    }

    function confirmDeleteChannel(id, name) {
        let ask = confirm(`🚨 ئایا تۆ پشت ڕاستی دڤێت کەناڵێ "${name}" ب تەمامی ژێ ببەی؟`);
        if (ask) {
            let savedChannels = JSON.parse(localStorage.getItem('user_channels')) || [];
            savedChannels = savedChannels.filter(c => c.id !== id);
            localStorage.setItem('user_channels', JSON.stringify(savedChannels));
            document.getElementById(id).remove();
        }
    }

    function loadSavedChannels() {
        let savedChannels = JSON.parse(localStorage.getItem('user_channels')) || [];
        savedChannels.forEach(ch => renderUserChannel(ch));
    }

    // فێچکرنا داتایێ ١٠,٠٠٠ کەناڵان دگەڵ بەشێ کورتێ وەرزش و بین سبۆرت و کاس العالم
    fetch('https://iptv-org.github.io/iptv/index.m3u')
        .then(res => res.text())
        .then(data => {
            loadSavedChannels();
            
            const lines = data.split('\n');
            const box = document.getElementById('channel-box');
            const tabsBar = document.getElementById('countries-bar');
            
            let currentName = '';
            let currentCountry = 'world';
            let detectedCountries = new Set();
            let chunkHtml = '';
            let count = 0;

            for (let i = 0; i < lines.length; i++) {
                let line = lines[i].trim();
                
                if (line.startsWith('#EXTINF:')) {
                    currentName = line.split(',')[1] || '';
                    currentCountry = 'world';
                    
                    if(line.includes('tvg-country="')) {
                        currentCountry = line.split('tvg-country="')[1].split('"')[0].toLowerCase();
                    }
                    
                    let lName = currentName.toLowerCase();
                    // دەستنیشانکرنا کەناڵێن وەرزشی، بین سبۆرت، و کاس العالم
                    if(lName.includes('bein') || lName.includes('sport') || lName.includes('alkass') || lName.includes('world cup') || lName.includes('fifa')) {
                        currentCountry = 'sport';
                    } else if(lName.includes('kurd') || lName.includes('rudaw') || lName.includes('waar')) {
                        currentCountry = 'kurd';
                    }
                    
                } else if (line.startsWith('http') && currentName) {
                    if (currentName.length > 40 || line.includes('Chrome')) continue;
                    
                    if (currentCountry === 'sport') {
                        chunkHtml += `<div class="channel-item" data-country="sport" onclick="playLive('${line}', '${currentName.replace(/'/g, "\\'")}', false)"><span>⚽ ${currentName}</span> <span class="badge badge-sport">Bein / Sport</span></div>`;
                        count++;
                    } else if (currentCountry !== 'world' && currentCountry !== 'kurd' && countryTranslations[currentCountry]) {
                        detectedCountries.add(currentCountry);
                        let bText = countryTranslations[currentCountry];
                        chunkHtml += `<div class="channel-item" data-country="${currentCountry}" onclick="playLive('${line}', '${currentName.replace(/'/g, "\\'")}', false)"><span>📺 ${currentName}</span> <span class="badge badge-global">${bText}</span></div>`;
                        count++;
                    }
                    currentName = '';
                }
            }
            
            detectedCountries.forEach(code => {
                const btn = document.createElement('button');
                btn.className = 'tab-btn';
                btn.innerText = countryTranslations[code];
                btn.onclick = function() { switchTab(code, this); };
                tabsBar.appendChild(btn);
            });

            box.insertAdjacentHTML('beforeend', chunkHtml);
            document.getElementById('loading-status').innerText = `✅ تەمام! ${count.toLocaleString()} کەناڵێن وەرزشی و جیهانی لۆد بوون.`;
        })
        .catch(err => {
            document.getElementById('loading-status').innerText = "کێشەیەک د هێڵێ دا هەیە.";
        });
</script>

</body>
</html>
