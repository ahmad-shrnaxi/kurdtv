<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KURD tv - Anti-Freeze Premium IPTV</title>
    
    <!-- Video.js Player CSS -->
    <link href="https://vjs.zencdn.net/7.20.3/video-js.css" rel="stylesheet" />
    <!-- FontAwesome ئایکۆن -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-main: #06090f;
            --bg-sidebar: #0d111a;
            --bg-card: #131924;
            --kurd-red: #ef4444;
            --kurd-green: #10b981;
            --kurd-gold: #fbbf24;
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
        }

        * { box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: var(--bg-main); color: var(--text-main); margin: 0; padding: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

        /* Navbar */
        .navbar { height: 65px; background-color: var(--bg-sidebar); display: flex; align-items: center; justify-content: space-between; padding: 0 20px; border-bottom: 1px solid rgba(255, 255, 255, 0.05); }
        .logo-area { display: flex; align-items: center; gap: 10px; }
        .sun-logo { width: 28px; height: 28px; background: radial-gradient(circle, #fffb00 20%, var(--kurd-gold) 70%); border-radius: 50%; box-shadow: 0 0 12px var(--kurd-gold); }
        .logo-text { font-size: 22px; font-weight: 900; color: #fff; }
        .logo-text span { color: var(--kurd-red); }

        .btn-add { background: linear-gradient(135deg, var(--kurd-green), #059669); color: white; border: none; padding: 8px 14px; border-radius: 6px; font-weight: bold; cursor: pointer; display: flex; align-items: center; gap: 6px; font-size: 13px; }

        /* Container */
        .main-container { display: flex; flex: 1; height: calc(100vh - 65px); overflow: hidden; }

        /* Video Frame */
        .content-section { flex: 2; padding: 20px; display: flex; flex-direction: column; gap: 15px; background: #06090f; }
        .player-wrapper { width: 100%; aspect-ratio: 16/9; background: #000; border-radius: 12px; overflow: hidden; box-shadow: 0 20px 40px rgba(0,0,0,0.7); position: relative; }
        .player-wrapper iframe, .player-wrapper video { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }
        .current-info { background: var(--bg-sidebar); padding: 14px 18px; border-radius: 10px; display: flex; align-items: center; gap: 12px; border-right: 4px solid var(--kurd-gold); }
        .current-info h2 { margin: 0; font-size: 16px; }

        /* Sidebar Anti-Freeze */
        .sidebar-section { width: 420px; background-color: var(--bg-sidebar); border-left: 1px solid rgba(255, 255, 255, 0.05); display: flex; flex-direction: column; padding: 15px; gap: 12px; }
        .search-wrapper { position: relative; }
        .search-wrapper i { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); color: var(--text-muted); }
        .search-box { width: 100%; padding: 11px 40px 11px 12px; background: var(--bg-main); border: 1px solid rgba(255,255,255,0.05); border-radius: 8px; color: white; font-size: 13px; }

        /* Tabs */
        .tabs-container { display: flex; gap: 6px; overflow-x: auto; padding-bottom: 6px; }
        .tab-item { background: var(--bg-card); color: var(--text-muted); padding: 6px 12px; border-radius: 6px; cursor: pointer; font-weight: 600; font-size: 11px; white-space: nowrap; }
        .tab-item.active { background: var(--kurd-gold); color: #000; }

        .status-bar { font-size: 11px; color: var(--kurd-gold); text-align: center; font-weight: bold; padding: 5px; }

        /* Grid Optimization - رێگریکردن لە فڕێزبۆن */
        .channel-grid { 
            flex: 1; overflow-y: auto; 
            display: grid; grid-template-columns: repeat(3, 1fr); 
            gap: 10px; padding-left: 2px;
            contain: layout pixels; /* هێزێ گرافیکی کەم دکەت دا فڕێز نەبیت */
        }

        .channel-card {
            background: var(--bg-card); border: 1px solid rgba(255,255,255,0.03); border-radius: 10px;
            aspect-ratio: 1/1; overflow: hidden; cursor: pointer; 
            display: flex; align-items: center; justify-content: center;
            position: relative; transition: transform 0.15s ease;
        }
        .channel-card:hover { transform: scale(1.04); border-color: var(--kurd-gold); }
        
        /* تەنها دەمێ وێنە ل بەر چاڤ بیت دێ لۆگۆ لۆد بیت (Lazy Load) */
        .channel-card img { width: 80%; height: 80%; object-fit: contain; }
        .poster-placeholder { font-size: 14px; font-weight: 800; color: var(--text-muted); text-align: center; text-transform: uppercase; }

        .badge-dot { position: absolute; top: 6px; left: 6px; width: 6px; height: 6px; border-radius: 50%; }
        .dot-kurd { background-color: var(--kurd-gold); }
        .dot-sport { background-color: #3b82f6; }
        .dot-global { background-color: #9ca3af; }

        @media (max-width: 992px) {
            .main-container { flex-direction: column; }
            .sidebar-section { width: 100%; max-height: 400px; }
            .channel-grid { grid-template-columns: repeat(4, 1fr); }
        }
    </style>
</head>
<body>

    <div class="navbar">
        <div class="logo-area"><div class="sun-logo"></div><div class="logo-text">KURD <span>tv</span></div></div>
        <button class="btn-add" onclick="addNewChannelPrompt()"><i class="fa-solid fa-plus"></i> زێدەکرن</button>
    </div>

    <div class="main-container">
        <!-- Player -->
        <div class="content-section">
            <div id="player-container" class="player-wrapper">
                <iframe id="yt-player" src="https://www.youtube.com/embed/yF8zNf-48g0" allowfullscreen></iframe>
            </div>
            <div class="current-info">
                <i class="fa-solid fa-circle-dot" style="color: var(--kurd-red)"></i>
                <h2 id="current-title">Rudaw TV Live</h2>
            </div>
        </div>

        <!-- Sidebar Grid optimized for 10K+ Channels -->
        <div class="sidebar-section">
            <div class="search-wrapper">
                <i class="fa-solid fa-magnifying-glass"></i>
                <input type="text" id="search" class="search-box" placeholder="ناڤێ کەنالی..." oninput="filterChannels()">
            </div>
            
            <div class="tabs-container">
                <div class="tab-item active" onclick="switchTab('all', this)">هەمی</div>
                <div class="tab-item" onclick="switchTab('kurd', this)">☀️ کوردستان</div>
                <div class="tab-item" onclick="switchTab('sport', this)">⚽ وەرزش</div>
                <div class="tab-item" onclick="switchTab('kids', this)">🧸 زارۆک</div>
                <div class="tab-item" onclick="switchTab('movie', this)">🎬 فلیم</div>
                <div class="tab-item" onclick="switchTab('user-added', this)">⭐ یێن من</div>
            </div>

            <div id="loading-status" class="status-bar">چاوڕێبە... کەنال دهێنە ڕێکخستن</div>
            <div class="channel-grid" id="channel-box"></div>
        </div>
    </div>

    <script src="https://vjs.zencdn.net/7.20.3/video.js"></script>
    <script>
        let player = null;
        let currentCategory = 'all';
        let allChannelsList = []; // پاشەکەوتکردنی هەمی کەنالان د میمۆریێ دا نەک ل سەر شاشێ
        let filteredList = [];

        const filterRules = {
            'sport': ['sport', 'bein', 'alkass', 'espn', 'arena', 'eurosport', 'football'],
            'kids': ['kids', 'cartoon', 'disney', 'nickelodeon', 'spacetoon', 'zarok'],
            'movie': ['movie', 'cinema', 'action', 'drama', 'fox', 'mbc2', 'افلام']
        };

        function playLive(url, name, isYoutube) {
            document.getElementById('current-title').innerText = name;
            const container = document.getElementById('player-container');
            if (isYoutube) {
                if(player) { player.dispose(); player = null; }
                container.innerHTML = `<iframe id="yt-player" src="${url}?autoplay=1" allowfullscreen allow="autoplay"></iframe>`;
            } else {
                container.innerHTML = `<video id="live-player" class="video-js vjs-default-skin vjs-big-play-centered" controls preload="auto" width="100%" height="100%"><source src="${url}" type="application/x-mpegURL"></video>`;
                player = videojs('live-player'); player.play();
            }
        }

        function switchTab(catCode, btn) {
            currentCategory = catCode;
            document.querySelectorAll('.tab-item').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            filterChannels();
        }

        // فلتەرکردنا خێرا د ناڤ میمۆریێ دا (رێگری ل باگ و هەنبۆنێ دکەت)
        function filterChannels() {
            let query = document.getElementById('search').value.toLowerCase();
            filteredList = allChannelsList.filter(ch => {
                let matchesCat = (currentCategory === 'all' || ch.type === currentCategory);
                let matchesSearch = ch.name.toLowerCase().includes(query);
                return matchesCat && matchesSearch;
            });
            renderOptimizedGrid();
        }

        // رەندرکرنا بەش بەش (تەنها ٦٠ کەنالێن یەکەم پیشان ددەت دا شاشە فڕێز نەبیت)
        function renderOptimizedGrid() {
            const box = document.getElementById('channel-box');
            box.innerHTML = ''; 
            
            let displayLimit = Math.min(filteredList.length, 60); 
            let chunkHtml = '';

            for (let i = 0; i < displayLimit; i++) {
                let ch = filteredList[i];
                let dotClass = ch.type === 'kurd' ? 'dot-kurd' : (ch.type === 'sport' ? 'dot-sport' : 'dot-global');
                
                // بەکارهێنانی loading="lazy" بۆ هندێ کۆمپیوتەر گەرم نەبیت دگەڵ وێنەیان
                let imgContent = `<div class="poster-placeholder">${ch.name.substring(0, 4)}</div>`;
                if(ch.logo && ch.logo.startsWith('http')) {
                    imgContent = `<img src="${ch.logo}" loading="lazy" onerror="this.style.display='none'; this.parentNode.insertAdjacentHTML('beforeend', '<div class=\\'poster-placeholder\\'>${ch.name.substring(0,4)}</div>')" alt="logo">`;
                }

                chunkHtml += `
                    <div class="channel-card" title="${ch.name}" onclick="playLive('${ch.url}', '${ch.name.replace(/'/g, "\\'")}', false)">
                        <div class="badge-dot ${dotClass}"></div>
                        ${imgContent}
                    </div>`;
            }
            box.innerHTML = chunkHtml;
            document.getElementById('loading-status').innerText = `کەنالێن دیتن ب لۆگۆ: ${filteredList.length} کەنال`;
        }

        // خویندنا ١0,000 کەنالان ب ئاوایەکێ پاراستی
        fetch('https://iptv-org.github.io/iptv/index.m3u')
            .then(res => res.text())
            .then(data => {
                const lines = data.split('\n');
                let currentName = ''; let currentLogo = '';

                // کەنالێن جێگیر یێن کوردی ل دەستپێکێ
                allChannelsList.push({ type: 'kurd', url: 'https://www.youtube.com/embed/yF8zNf-48g0', name: 'Rudaw TV', logo: 'https://upload.wikimedia.org/wikipedia/commons/e/e2/Rudaw_logo_2022.PNG' });

                for (let i = 0; i < lines.length; i++) {
                    let line = lines[i].trim();
                    if (line.startsWith('#EXTINF:')) {
                        currentName = line.split(',')[1] || '';
                        if(line.includes('tvg-logo="')) {
                            currentLogo = line.split('tvg-logo="')[1].split('"')[0];
                        }
                    } else if (line.startsWith('http') && currentName) {
                        let lName = currentName.toLowerCase();
                        let detectedCat = 'global';

                        if(lName.includes('kurd') || lName.includes('rudaw') || lName.includes('waar') || lName.includes('kurdistan')) {
                            detectedCat = 'kurd';
                        } else {
                            for (let key in filterRules) {
                                if (filterRules[key].some(kwd => lName.includes(kwd))) { detectedCat = key; break; }
                            }
                        }
                        allChannelsList.push({ type: detectedCat, url: line, name: currentName, logo: currentLogo });
                        currentName = ''; currentLogo = '';
                    }
                }
                filterChannels(); // تەنها یەکجار لۆد دکەت
            });
    </script>
</body>
</html>
