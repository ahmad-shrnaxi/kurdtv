<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kurd & World Premium TV</title>
    <link href="https://vjs.zencdn.net/7.20.3/video-js.css" rel="stylesheet" />
    <style>
        :root {
            --bg-color: #0d1117;
            --card-bg: #161b22;
            --kurd-red: #e63946;
            --kurd-green: #2a9d8f;
            --kurd-gold: #e9c46a;
            --text-color: #f0f6fc;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
        }
        .container { max-width: 1300px; margin: 0 auto; }
        
        /* دیزاینێ کوردی و مۆدێرن بۆ سەرێ لاپەڕەی */
        .header {
            text-align: center;
            padding: 20px;
            background: linear-gradient(135deg, var(--kurd-red), var(--kurd-green));
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            margin-bottom: 25px;
            border-bottom: 5px solid var(--kurd-gold);
        }
        .header h1 { margin: 0; font-size: 28px; color: #fff; text-shadow: 2px 2px 4px rgba(0,0,0,0.6); }
        .header p { margin: 5px 0 0 0; color: var(--kurd-gold); font-weight: bold; }

        .main-layout { display: flex; flex-direction: column; gap: 20px; }
        @media (min-width: 992px) { .main-layout { flex-direction: row; } }

        /* بەشێ شاشا ڤیدیۆیێ */
        .player-section { flex: 2; background: var(--card-bg); padding: 20px; border-radius: 12px; border: 1px solid #30363d; }
        .video-wrapper { width: 100%; aspect-ratio: 16/9; background: #000; border-radius: 8px; overflow: hidden; box-shadow: 0 8px 20px rgba(0,0,0,0.7); }
        #current-title { margin-top: 15px; font-size: 18px; color: var(--kurd-gold); font-weight: bold; text-align: right; }

        /* بەشێ کەتەلۆگ و لیستا کەناڵان */
        .sidebar-section { flex: 1.2; background: var(--card-bg); padding: 20px; border-radius: 12px; border: 1px solid #30363d; display: flex; flex-direction: column; max-height: 650px; }
        
        /* سندوقا گەڕیانێ یا گشتی */
        .search-box { width: 100%; padding: 12px 15px; background: #0d1117; border: 2px solid #30363d; color: white; border-radius: 8px; margin-bottom: 15px; box-sizing: border-box; text-align: right; font-size: 15px; transition: 0.3s; }
        .search-box:focus { border-color: var(--kurd-gold); outline: none; }

        /* تابلۆیا پشکان (Tabs) */
        .tabs { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 10px; margin-bottom: 15px; border-bottom: 1px solid #30363d; }
        .tab-btn { background: #21262d; border: 1px solid #30363d; color: #8b949e; padding: 8px 16px; border-radius: 6px; cursor: pointer; font-weight: bold; white-space: nowrap; transition: 0.2s; }
        .tab-btn.active, .tab-btn:hover { background: var(--kurd-gold); color: #0d1117; border-color: var(--kurd-gold); }

        /* لیستا کەناڵان */
        .channel-list { overflow-y: auto; flex-grow: 1; display: flex; flex-direction: column; gap: 8px; }
        .channel-item { display: flex; align-items: center; justify-content: space-between; background: #21262d; border: 1px solid #30363d; color: white; padding: 12px; text-align: right; border-radius: 8px; cursor: pointer; transition: 0.2s; }
        .channel-item:hover { background: #30363d; border-color: var(--kurd-gold); }
        .badge { font-size: 11px; padding: 3px 8px; border-radius: 4px; font-weight: bold; }
        .badge-kurd { background: var(--kurd-red); color: white; }
        .badge-arab { background: #0077b6; color: white; }
        .badge-turk { background: #cc2014; color: white; }
        .badge-kids { background: #ffb703; color: #000; }
        .badge-doc { background: #606c38; color: white; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>پلاتفۆرمێ شاهانە یێ کەناڵێن کوردی و جیهانی</h1>
        <p>دیزاینەکێ مۆدێرن ب ڕەنگ و سیمایێ کوردی لایڤ ستریم</p>
    </div>

    <div class="main-layout">
        <div class="player-section">
            <div class="video-wrapper">
                <video id="live-player" class="video-js vjs-default-skin vjs-big-play-centered" controls preload="auto" width="100%" height="100%">
                    <source src="https://live.france24.com/france24/en/vdo_en.m3u8" type="application/x-mpegURL">
                </video>
            </div>
            <div id="current-title">کەناڵێ نوکە: France 24 Live</div>
        </div>

        <div class="sidebar-section">
            <input type="text" id="search" class="search-box" placeholder="ل ڤێرێ ل سەر هەر کەناڵەکی بگەڕێ..." oninput="filterChannels()">
            
            <div class="tabs">
                <button class="tab-btn active" onclick="switchTab('all', this)">هەمی</button>
                <button class="tab-btn" onclick="switchTab('kurd', this)">کوردی</button>
                <button class="tab-btn" onclick="switchTab('arabic', this)">العربية</button>
                <button class="tab-btn" onclick="switchTab('turkish', this)">Türkçe</button>
                <button class="tab-btn" onclick="switchTab('kids', this)">زارۆکان</button>
                <button class="tab-btn" onclick="switchTab('doc', this)">دیکیۆمێنتاری</button>
            </div>

            <div class="channel-list" id="channel-box">
                <div class="channel-item" data-cat="kurd" onclick="playLive('https://www.youtube.com/embed/yF8zNf-48g0', 'Rudaw TV', true)"><span>📺 Rudaw TV Live</span> <span class="badge badge-kurd">کوردی</span></div>
                <div class="channel-item" data-cat="kurd" onclick="playLive('https://www.youtube.com/embed/n4_8LdY-p8M', 'Kurdistan 24', true)"><span>📺 Kurdistan 24</span> <span class="badge badge-kurd">کوردی</span></div>
                
                <div class="channel-item" data-cat="arabic" onclick="playLive('https://www.youtube.com/embed/bNyUyrR0PHo', 'Al Jazeera', true)"><span>📺 الجزيرة العربية</span> <span class="badge badge-arab">العربية</span></div>
                <div class="channel-item" data-cat="arabic" onclick="playLive('https://live.france24.com/france24/ar/vdo_ar.m3u8', 'France 24 Ar', false)"><span>📺 فرانس ٢٤ العربية</span> <span class="badge badge-arab">العربية</span></div>

                <div class="channel-item" data-cat="turkish" onclick="playLive('https://www.youtube.com/embed/J78S_uX8CqU', 'TRT World', true)"><span>📺 TRT World</span> <span class="badge badge-turk">Türkçe</span></div>

                <div class="channel-item" data-cat="kids" onclick="playLive('https://example.com/kids-live.m3u8', 'Spacetoon Sample', false)"><span>👶 Spacetoon Live</span> <span class="badge badge-kids">زارۆکان</span></div>

                <div class="channel-item" data-cat="doc" onclick="playLive('https://example.com/doc-live.m3u8', 'Nat Geo Sample', false)"><span>🌿 National Geographic</span> <span class="badge badge-doc">دیکیۆمێنتاری</span></div>
            </div>
        </div>
    </div>
</div>

<script src="https://vjs.zencdn.net/7.20.3/video.js"></script>
<script>
    let player = videojs('live-player');
    let currentCategory = 'all';

    // گۆڕینا جۆرێ ستریمێ (یوتیوب یان IPTV ڕاستەوخۆ)
    function playLive(url, name, isYoutube) {
        document.getElementById('current-title').innerText = "کەناڵێ نوکە: " + name;
        const container = document.getElementById('player-container');
        
        if (isYoutube) {
            player.dispose(); // لادانی پلەیەرێ کۆن بۆ ڕێگریکردن د کێشان دا
            document.getElementById('player-section').innerHTML = `
                <div id="player-container" class="video-wrapper">
                    <iframe id="yt-player" src="${url}" style="width:100%; height:100%; border:none;" allowfullscreen></iframe>
                </div>
                <div id="current-title">کەناڵێ نوکە: ${name}</div>`;
        } else {
            // ئەگەر پلەیەر هاتبیە لادان، ژ نوو ئاوا بکە
            if(!document.getElementById('live-player')) {
                document.getElementById('player-section').innerHTML = `
                    <div id="player-container" class="video-wrapper">
                        <video id="live-player" class="video-js vjs-default-skin" controls preload="auto" width="100%" height="100%">
                            <source src="${url}" type="application/x-mpegURL">
                        </video>
                    </div>
                    <div id="current-title">کەناڵێ نوکە: ${name}</div>`;
                player = videojs('live-player');
            }
            player.src({ src: url, type: 'application/x-mpegURL' });
            player.play();
        }
    }

    // گۆڕینی پشکان (Tabs)
    function switchTab(cat, btn) {
        currentCategory = cat;
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        filterChannels();
    }

    // سیستەمێ گەڕیانا هۆشمەند (گشتی + پشکی)
    function filterChannels() {
        let query = document.getElementById('search').value.toLowerCase();
        let items = document.querySelectorAll('.channel-item');
        
        items.forEach(item => {
            let cat = item.getAttribute('data-cat');
            let text = item.innerText.toLowerCase();
            
            let matchesCategory = (currentCategory === 'all' || cat === currentCategory);
            let matchesSearch = text.includes(query);
            
            if (matchesCategory && matchesSearch) {
                item.style.display = "flex";
            } else {
                item.style.display = "none";
            }
        });
    }

    // لۆدکردنا خۆکار یا ۱۰۰۰ کەناڵێن جیهانی ژ داتابەیسێ بۆ پشکێن جیاواز
    fetch('https://iptv-org.github.io/iptv/index.m3u')
        .then(res => res.text())
        .then(data => {
            const lines = data.split('\n');
            const box = document.getElementById('channel-box');
            let currentName = '';
            let html = '';
            
            for (let i = 0; i < lines.length && i < 3000; i++) { // پشکنینا ٣٠٠٠ دێڕێن دەستپێکێ
                let line = lines[i].trim();
                if (line.startsWith('#EXTINF:')) {
                    currentName = line.split(',')[1] || 'Unknown Channel';
                } else if (line.startsWith('http')) {
                    let url = line;
                    let cat = 'arabic'; // پاشبنەمایا گشتی
                    let badgeClass = 'badge-arab';
                    let badgeText = 'العربية';
                    
                    // دابەشکرنا خۆکار ل سەر بنەمای ناڤی
                    let lowerName = currentName.toLowerCase();
                    if(lowerName.includes('kurd') || lowerName.includes('rudaw') || lowerName.includes('zarok')) { cat = 'kurd'; badgeClass = 'badge-kurd'; badgeText = 'کوردی'; }
                    else if(lowerName.includes('trt') || lowerName.includes('turk')) { cat = 'turkish'; badgeClass = 'badge-turk'; badgeText = 'Türkçe'; }
                    else if(lowerName.includes('kids') || lowerName.includes('cartoon') || lowerName.includes('disney')) { cat = 'kids'; badgeClass = 'badge-kids'; badgeText = 'زارۆکان'; }
                    else if(lowerName.includes('doc') || lowerName.includes('geo') || lowerName.includes('history')) { cat = 'doc'; badgeClass = 'badge-doc'; badgeText = 'دیکیۆمێنتاری'; }
                    
                    if(currentName && url) {
                        html += `<div class="channel-item" data-cat="${cat}" onclick="playLive('${url}', '${currentName}', false)"><span>📺 ${currentName}</span> <span class="badge ${badgeClass}">${badgeText}</span></div>`;
                    }
                }
            }
            box.innerHTML += html;
        });
</script>

</body>
</html>
