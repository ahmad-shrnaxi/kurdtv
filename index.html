<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KURD tv - Premium IPTV Player</title>
    
    <link href="https://vjs.zencdn.net/7.20.3/video-js.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-main: #0b0f19;
            --bg-sidebar: #111827;
            --bg-card: #1f2937;
            --kurd-red: #ef4444;
            --kurd-green: #10b981;
            --kurd-gold: #fbbf24;
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
            --accent: #3b82f6;
        }

        * {
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        body {
            background-color: var(--bg-main);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
            user-select: none;
        }

        /* سەرێ لاپەڕەی / Navbar */
        .navbar {
            height: 70px;
            background-color: var(--bg-sidebar);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 25px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
            z-index: 10;
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .sun-logo {
            width: 32px;
            height: 32px;
            background: radial-gradient(circle, #fffb00 20%, var(--kurd-gold) 70%);
            border-radius: 50%;
            box-shadow: 0 0 15px var(--kurd-gold);
            animation: pulse 2s infinite alternate;
        }

        .logo-text {
            font-size: 24px;
            font-weight: 900;
            letter-spacing: 0.5px;
            color: #fff;
        }
        .logo-text span {
            color: var(--kurd-red);
        }

        .nav-actions {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .btn-add {
            background: linear-gradient(135deg, var(--kurd-green), #059669);
            color: white;
            border: none;
            padding: 10px 18px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s ease;
            font-size: 14px;
            box-shadow: 0 4px 12px rgba(16, 185, 129, 0.2);
        }
        .btn-add:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 18px rgba(16, 185, 129, 0.4);
        }

        /* دابەشکردنا سەرەکی */
        .main-container {
            display: flex;
            flex: 1;
            height: calc(100vh - 70px);
            overflow: hidden;
        }

        /* بەشێ پلەیەر و لایڤێ مۆدێرن */
        .content-section {
            flex: 2;
            padding: 25px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            overflow-y: auto;
            background: linear-gradient(180deg, rgba(17,24,39,0.3) 0%, rgba(11,15,25,1) 100%);
        }

        .player-wrapper {
            width: 100%;
            aspect-ratio: 16/9;
            background: #000;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(0,0,0,0.6);
            border: 1px solid rgba(255,255,255,0.05);
            position: relative;
        }
        .player-wrapper iframe, .player-wrapper video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }

        .current-info {
            background: var(--bg-sidebar);
            padding: 16px 20px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            gap: 15px;
            border-right: 5px solid var(--kurd-gold);
            box-shadow: 0 4px 15px rgba(0,0,0,0.15);
        }
        .current-info i {
            color: var(--kurd-gold);
            font-size: 20px;
        }
        .current-info h2 {
            margin: 0;
            font-size: 18px;
            font-weight: 600;
        }

        /* بەشێ کەتەلۆگ و سایدبار */
        .sidebar-section {
            width: 420px;
            background-color: var(--bg-sidebar);
            border-left: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            flex-direction: column;
            padding: 20px;
            gap: 15px;
        }

        .search-wrapper {
            position: relative;
        }
        .search-wrapper i {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
        }
        .search-box {
            width: 100%;
            padding: 14px 45px 14px 15px;
            background: var(--bg-main);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 10px;
            color: white;
            font-size: 14px;
            transition: all 0.2s;
        }
        .search-box:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 10px rgba(59, 130, 246, 0.2);
        }

        /* کاتیگۆری / تەب کەتەلۆگ */
        .tabs-container {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            padding-bottom: 8px;
        }
        .tabs-container::-webkit-scrollbar {
            height: 4px;
        }
        .tabs-container::-webkit-scrollbar-thumb {
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
        }

        .tab-item {
            background: var(--bg-card);
            color: var(--text-muted);
            border: 1px solid rgba(255,255,255,0.03);
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 13px;
            white-space: nowrap;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .tab-item:hover, .tab-item.active {
            background: var(--kurd-gold);
            color: #000;
        }

        .status-bar {
            font-size: 12px;
            color: var(--kurd-gold);
            background: rgba(251, 191, 36, 0.08);
            padding: 10px;
            border-radius: 8px;
            text-align: center;
            font-weight: bold;
        }

        /* لیستا نوو یا کارتێن کەناڵان (Netflix Style) */
        .channel-grid {
            flex: 1;
            overflow-y: auto;
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            padding-right: 2px;
        }
        .channel-grid::-webkit-scrollbar {
            width: 5px;
        }
        .channel-grid::-webkit-scrollbar-thumb {
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
        }

        .channel-card {
            background: var(--bg-card);
            border: 1px solid rgba(255,255,255,0.04);
            border-radius: 12px;
            padding: 15px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            gap: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
            position: relative;
            overflow: hidden;
        }
        .channel-card:hover {
            transform: translateY(-3px);
            border-color: var(--kurd-gold);
            background: #253041;
            box-shadow: 0 8px 20px rgba(0,0,0,0.4);
        }

        .channel-info {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .channel-icon-box {
            width: 36px;
            height: 36px;
            background: rgba(255,255,255,0.05);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--kurd-gold);
            font-size: 16px;
        }
        .channel-name {
            font-size: 14px;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 110px;
        }

        .card-badge {
            font-size: 10px;
            padding: 4px 8px;
            border-radius: 6px;
            font-weight: bold;
            align-self: flex-start;
        }
        .badge-kurd { background: rgba(239, 68, 68, 0.15); color: #f87171; border: 1px solid rgba(239, 68, 68, 0.3); }
        .badge-sport { background: rgba(59, 130, 246, 0.15); color: #60a5fa; border: 1px solid rgba(59, 130, 246, 0.3); }
        .badge-global { background: rgba(156, 163, 175, 0.15); color: #e5e7eb; border: 1px solid rgba(156, 163, 175, 0.3); }
        .badge-user { background: rgba(168, 85, 247, 0.15); color: #c084fc; border: 1px solid rgba(168, 85, 247, 0.3); }

        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 0 10px var(--kurd-gold); }
            100% { transform: scale(1.05); box-shadow: 0 0 20px var(--kurd-gold); }
        }

        /* گونجاندن بۆ شاشەیێن مۆبایلان */
        @media (max-width: 992px) {
            .main-container { flex-direction: column; overflow-y: auto; height: auto; }
            .sidebar-section { width: 100%; height: 500px; }
            body { overflow-y: auto; height: auto; }
        }
    </style>
</head>
<body>

    <div class="navbar">
        <div class="logo-area">
            <div class="sun-logo"></div>
            <div class="logo-text">KURD <span>tv</span></div>
        </div>
        <div class="nav-actions">
            <button class="btn-add" onclick="addNewChannelPrompt()">
                <i class="fa-solid fa-plus"></i> زێدەکرن
            </button>
        </div>
    </div>

    <div class="main-container">
        
        <div class="content-section">
            <div id="player-container" class="player-wrapper">
                <iframe id="yt-player" src="https://www.youtube.com/embed/yF8zNf-48g0" allowfullscreen></iframe>
            </div>
            <div class="current-info">
                <i class="fa-solid fa-circle-dot fa-beat"></i>
                <h2 id="current-title">کەناڵێ نوکە: Rudaw TV Live</h2>
            </div>
        </div>

        <div class="sidebar-section">
            <div class="search-wrapper">
                <i class="fa-solid fa-magnifying-glass"></i>
                <input type="text" id="search" class="search-box" placeholder="ناڤێ کەناڵی ل ڤێرێ بگەڕێ..." oninput="filterChannels()">
            </div>
            
            <div class="tabs-container" id="countries-bar">
                <div class="tab-item active" onclick="switchTab('all', this)"><i class="fa-solid fa-globe"></i> هەمی</div>
                <div class="tab-item" onclick="switchTab('sport', this)"><i class="fa-solid fa-soccer-ball"></i> وەرزشی</div>
                <div class="tab-item" onclick="switchTab('kurd', this)"><i class="fa-solid fa-sun"></i> کوردستان</div>
                <div class="tab-item" onclick="switchTab('user-added', this)"><i class="fa-solid fa-star"></i> یێن من</div>
            </div>

            <div id="loading-status" class="status-bar">
                <i class="fa-solid fa-spinner fa-spin"></i> چاڤەڕێبن... لۆدکرنا کەناڵێن جیهانی...
            </div>

            <div class="channel-grid" id="channel-box">
                <div class="channel-card" data-country="kurd" onclick="playLive('https://www.youtube.com/embed/yF8zNf-48g0', 'Rudaw TV Live', true)">
                    <div class="channel-info">
                        <div class="channel-icon-box"><i class="fa-solid fa-tv"></i></div>
                        <div class="channel-name">Rudaw TV</div>
                    </div>
                    <span class="card-badge badge-kurd">ناوخۆ</span>
                </div>
                <div class="channel-card" data-country="kurd" onclick="playLive('https://www.youtube.com/embed/n4_8LdY-p8M', 'Kurdistan 24 Live', true)">
                    <div class="channel-info">
                        <div class="channel-icon-box"><i class="fa-solid fa-tv"></i></div>
                        <div class="channel-name">Kurdistan 24</div>
                    </div>
                    <span class="card-badge badge-kurd">ناوخۆ</span>
                </div>
                <div class="channel-card" data-country="kurd" onclick="playLive('https://www.youtube.com/embed/hd_S3b8F_M0', 'Waar TV Live', true)">
                    <div class="channel-info">
                        <div class="channel-icon-box"><i class="fa-solid fa-tv"></i></div>
                        <div class="channel-name">Waar TV</div>
                    </div>
                    <span class="card-badge badge-kurd">ناوخۆ</span>
                </div>
                <div class="channel-card" data-country="kurd" onclick="playLive('https://www.youtube.com/embed/V6W3o-GfP98', 'Gali Kurdistan Live', true)">
                    <div class="channel-info">
                        <div class="channel-icon-box"><i class="fa-solid fa-tv"></i></div>
                        <div class="channel-name">Gali Kurdistan</div>
                    </div>
                    <span class="card-badge badge-kurd">ناوخۆ</span>
                </div>
            </div>
        </div>

    </div>

    <script src="https://vjs.zencdn.net/7.20.3/video.js"></script>
    <script>
        let player = null;
        let currentCountryCode = 'all';

        const countryTranslations = {
            'us': '🇺🇸 ئەمریکا', 'it': '🇮🇹 ئیتالیا', 'in': '🇮🇳 هیندستان', 'fr': '🇫🇷 فڕەنسا', 
            'de': '🇩🇪 ئەڵمانیا', 'tr': '🇹🇷 تورکیا', 'iq': '🇮🇶 عێراق', 'sa': '🇸🇦 سعوودیە', 
            'ae': '🇦ئه مریکا', 'uk': '🇬🇧 بەریتانیا', 'es': '🇪🇸 ئیسپانیا'
        };

        function playLive(url, name, isYoutube) {
            document.getElementById('current-title').innerText = "کەناڵێ نوکە: " + name;
            const container = document.getElementById('player-container');
            
            if (isYoutube) {
                if(player) { player.dispose(); player = null; }
                container.innerHTML = `<iframe id="yt-player" src="${url}?autoplay=1" allowfullscreen allow="autoplay"></iframe>`;
            } else {
                container.innerHTML = `
                    <video id="live-player" class="video-js vjs-default-skin vjs-big-play-centered" controls preload="auto" width="100%" height="100%">
                        <source src="${url}" type="application/x-mpegURL">
                    </video>`;
                player = videojs('live-player');
                player.play();
            }
        }

        function switchTab(countryCode, btn) {
            currentCountryCode = countryCode;
            document.querySelectorAll('.tab-item').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            filterChannels();
        }

        function filterChannels() {
            let query = document.getElementById('search').value.toLowerCase();
            let items = document.querySelectorAll('.channel-card');
            
            items.forEach(item => {
                let country = item.getAttribute('data-country');
                let text = item.innerText.toLowerCase();
                
                let matchesCountry = (currentCountryCode === 'all' || country === currentCountryCode);
                let matchesSearch = text.includes(query);
                
                item.style.display = (matchesCountry && matchesSearch) ? "flex" : "none";
            });
        }

        function addNewChannelPrompt() {
            let name = prompt("ناڤێ کەناڵێ نوو:");
            if (!name) return;
            let url = prompt("لینکێ کەناڵی (m3u8 یان یوتیوب):");
            if (!url) return;

            let isYoutube = url.includes("youtube.com") || url.includes("youtu.be");
            if (isYoutube && !url.includes("embed/")) {
                let videoId = "";
                if (url.includes("v=")) videoId = url.split("v=")[1].split("&")[0];
                else if (url.includes("youtu.be/")) videoId = url.split("youtu.be/")[1].split("?")[0];
                if (videoId) url = `https://www.youtube.com/embed/${videoId}`;
            }

            let id = 'ch_' + Date.now();
            let newChannel = { id: id, name: name, url: url, isYoutube: isYoutube };
            
            let savedChannels = JSON.parse(localStorage.getItem('user_channels')) || [];
            savedChannels.push(newChannel);
            localStorage.setItem('user_channels', JSON.stringify(savedChannels));
            
            renderUserChannel(newChannel);
        }

        function renderUserChannel(ch) {
            const box = document.getElementById('channel-box');
            const div = document.createElement('div');
            div.className = 'channel-card';
            div.setAttribute('data-country', 'user-added');
            div.setAttribute('id', ch.id);
            div.innerHTML = `
                <div class="channel-info">
                    <div class="channel-icon-box"><i class="fa-solid fa-star"></i></div>
                    <div class="channel-name">${ch.name}</div>
                </div>
                <span class="card-badge badge-user">زێدەکری</span>`;
            
            div.addEventListener('click', function() {
                playLive(ch.url, ch.name, ch.isYoutube);
            });

            div.addEventListener('contextmenu', function(e) {
                e.preventDefault();
                confirmDeleteChannel(ch.id, ch.name);
            });

            box.insertBefore(div, box.firstChild);
        }

        function confirmDeleteChannel(id, name) {
            if (confirm(`🚨 ئایا دڤێت "${name}" ژێببەی؟`)) {
                let savedChannels = JSON.parse(localStorage.getItem('user_channels')) || [];
                savedChannels = savedChannels.filter(c => c.id !== id);
                localStorage.setItem('user_channels', JSON.stringify(savedChannels));
                document.getElementById(id).remove();
            }
        }

        function loadSavedChannels() {
            let savedChannels = JSON.parse(localStorage.getItem('user_channels')) || [];
            savedChannels.forEach(ch => renderUserChannel(ch));
        }

        // فێچکرنا پارچە پارچە بۆ وێب براوزەری دا خێرا بیت
        fetch('https://iptv-org.github.io/iptv/index.m3u')
            .then(res => res.text())
            .then(data => {
                loadSavedChannels();
                const lines = data.split('\n');
                const box = document.getElementById('channel-box');
                const tabsBar = document.getElementById('countries-bar');
                
                let currentName = '';
                let currentCountry = 'world';
                let detectedCountries = new Set();
                let validChannels = [];

                for (let i = 0; i < lines.length; i++) {
                    let line = lines[i].trim();
                    if (line.startsWith('#EXTINF:')) {
                        currentName = line.split(',')[1] || '';
                        if(line.includes('tvg-country="')) {
                            currentCountry = line.split('tvg-country="')[1].split('"')[0].toLowerCase();
                        }
                        let lName = currentName.toLowerCase();
                        if(lName.includes('bein') || lName.includes('sport') || lName.includes('alkass')) {
                            currentCountry = 'sport';
                        } else if(lName.includes('kurd') || lName.includes('rudaw')) {
                            currentCountry = 'kurd';
                        }
                    } else if (line.startsWith('http') && currentName) {
                        if (currentName.length <= 45 && !line.includes('Chrome')) {
                            if (currentCountry === 'sport') {
                                validChannels.push({ type: 'sport', url: line, name: currentName });
                            } else if (countryTranslations[currentCountry]) {
                                detectedCountries.add(currentCountry);
                                validChannels.push({ type: currentCountry, url: line, name: currentName });
                            }
                        }
                        currentName = '';
                    }
                }
                
                detectedCountries.forEach(code => {
                    const div = document.createElement('div');
                    div.className = 'tab-item';
                    div.innerText = countryTranslations[code];
                    div.onclick = function() { switchTab(code, this); };
                    tabsBar.appendChild(div);
                });

                let index = 0;
                const chunkSize = 150;
                function renderChunks() {
                    if (index >= validChannels.length) {
                        document.getElementById('loading-status').innerHTML = `<i class="fa-solid fa-circle-check"></i> تەمام! ${validChannels.length.toLocaleString()} کەناڵ لۆد بوون.`;
                        return;
                    }
                    let chunkHtml = '';
                    let limit = Math.min(index + chunkSize, validChannels.length);
                    for (let i = index; i < limit; i++) {
                        let ch = validChannels[i];
                        let cleanName = ch.name.replace(/'/g, "\\'");
                        if (ch.type === 'sport') {
                            chunkHtml += `
                                <div class="channel-card" data-country="sport" onclick="playLive('${ch.url}', '${cleanName}', false)">
                                    <div class="channel-info">
                                        <div class="channel-icon-box"><i class="fa-solid fa-baseball"></i></div>
                                        <div class="channel-name">${ch.name}</div>
                                    </div>
                                    <span class="card-badge badge-sport">Bein Sport</span>
                                </div>`;
                        } else {
                            let bText = countryTranslations[ch.type];
                            chunkHtml += `
                                <div class="channel-card" data-country="${ch.type}" onclick="playLive('${ch.url}', '${cleanName}', false)">
                                    <div class="channel-info">
                                        <div class="channel-icon-box"><i class="fa-solid fa-tv"></i></div>
                                        <div class="channel-name">${ch.name}</div>
                                    </div>
                                    <span class="card-badge badge-global">${bText}</span>
                                </div>`;
                        }
                    }
                    box.insertAdjacentHTML('beforeend', chunkHtml);
