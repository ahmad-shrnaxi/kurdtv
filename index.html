<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KURD tv - Global Shared Channels</title>
    
    <!-- Video.js Player CSS -->
    <link href="https://vjs.zencdn.net/7.20.3/video-js.css" rel="stylesheet" />
    <!-- FontAwesome ئایکۆن -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Firebase SDKs - پێویست بۆ بەستنەوەی گشتی هەموو بەکارهێنەران -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    
    <style>
        :root {
            --bg-main: #06090f;
            --bg-sidebar: #0d111a;
            --bg-card: #172030;
            --kurd-red: #ef4444;
            --kurd-green: #10b981;
            --kurd-gold: #fbbf24;
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
        }

        * { box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; touch-action: manipulation; }
        body { background-color: var(--bg-main); color: var(--text-main); margin: 0; padding: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

        /* Navbar */
        .navbar { height: 60px; background-color: var(--bg-sidebar); display: flex; align-items: center; justify-content: space-between; padding: 0 15px; border-bottom: 1px solid rgba(255, 255, 255, 0.05); shrink: 0; }
        .logo-area { display: flex; align-items: center; gap: 8px; }
        .sun-logo { width: 22px; height: 22px; background: radial-gradient(circle, #fffb00 20%, var(--kurd-gold) 70%); border-radius: 50%; box-shadow: 0 0 10px var(--kurd-gold); }
        .logo-text { font-size: 18px; font-weight: 900; color: #fff; }
        .logo-text span { color: var(--kurd-red); }

        .btn-add { background: linear-gradient(135deg, var(--kurd-green), #059669); color: white; border: none; padding: 6px 12px; border-radius: 6px; font-weight: bold; cursor: pointer; display: flex; align-items: center; gap: 5px; font-size: 11px; }

        /* Container */
        .main-container { display: flex; flex: 1; height: calc(100vh - 60px); overflow: hidden; }

        /* Video Frame */
        .content-section { flex: 2; padding: 12px; display: flex; flex-direction: column; gap: 10px; background: #06090f; }
        .player-wrapper { width: 100%; aspect-ratio: 16/9; background: #000; border-radius: 8px; overflow: hidden; box-shadow: 0 10px 25px rgba(0,0,0,0.5); position: relative; }
        .player-wrapper iframe, .player-wrapper video { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }
        .current-info { background: var(--bg-sidebar); padding: 10px 12px; border-radius: 6px; display: flex; align-items: center; gap: 8px; border-right: 4px solid var(--kurd-gold); }
        .current-info h2 { margin: 0; font-size: 14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        /* Sidebar */
        .sidebar-section { width: 360px; background-color: var(--bg-sidebar); border-left: 1px solid rgba(255, 255, 255, 0.05); display: flex; flex-direction: column; padding: 12px; gap: 10px; overflow: hidden; }
        .search-wrapper { position: relative; }
        .search-wrapper i { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); color: var(--text-muted); }
        .search-box { width: 100%; padding: 10px 35px 10px 12px; background: var(--bg-main); border: 1px solid rgba(255,255,255,0.05); border-radius: 6px; color: white; font-size: 13px; }

        /* Tabs */
        .tabs-container { display: flex; gap: 5px; overflow-x: auto; padding-bottom: 4px; -webkit-overflow-scrolling: touch; }
        .tab-item { background: var(--bg-card); color: var(--text-muted); padding: 6px 12px; border-radius: 6px; cursor: pointer; font-weight: 600; font-size: 12px; white-space: nowrap; }
        .tab-item.active { background: var(--kurd-gold); color: #000; }

        .status-bar { font-size: 11px; color: var(--kurd-gold); text-align: center; font-weight: bold; }

        /* Single Column Grid */
        .channel-grid { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 6px; }

        .channel-card { 
            background: var(--bg-card); border: 1px solid rgba(255,255,255,0.04); border-radius: 8px; 
            padding: 10px 14px; cursor: pointer; display: flex; align-items: center; justify-content: space-between; 
            min-height: 48px; -webkit-user-select: none; user-select: none; 
        }
        .channel-card:hover { border-color: var(--kurd-gold); background: #1c2639; }
        .channel-card:active { background: #222d42; }
        
        .channel-title { font-size: 13.5px; font-weight: 700; color: #fff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; text-align: right; flex: 1; margin-left: 10px; }
        .channel-badge { font-size: 10px; color: var(--text-muted); display: flex; align-items: center; gap: 5px; shrink: 0; }

        .badge-dot { width: 6px; height: 6px; border-radius: 50%; display: inline-block; }
        .dot-kurd { background-color: var(--kurd-gold); }
        .dot-sport { background-color: #3b82f6; }
        .dot-user { background-color: var(--kurd-green); }
        .dot-global { background-color: #9ca3af; }

        @media (max-width: 992px) {
            body { overflow-y: auto; height: auto; }
            .main-container { flex-direction: column; height: auto; overflow: visible; }
            .sidebar-section { width: 100%; height: calc(100vh - 300px); min-height: 450px; border-left: none; border-top: 1px solid rgba(255,255,255,0.05); }
            .content-section { flex: none; width: 100%; position: sticky; top: 0; z-index: 100; background: var(--bg-main); padding-bottom: 5px; box-shadow: 0 10px 20px rgba(0,0,0,0.5); }
        }
    </style>
</head>
<body>

    <div class="navbar">
        <div class="logo-area"><div class="sun-logo"></div><div class="logo-text">KURD <span>tv</span></div></div>
        <button class="btn-add" onclick="addNewChannelPrompt()"><i class="fa-solid fa-plus"></i> زێدەکرن بۆ هەمووان</button>
    </div>

    <div class="main-container">
        <!-- Player -->
        <div class="content-section">
            <div id="player-container" class="player-wrapper">
                <iframe id="yt-player" src="https://www.youtube.com/embed/yF8zNf-48g0" allowfullscreen></iframe>
            </div>
            <div class="current-info">
                <i class="fa-solid fa-circle-dot" style="color: var(--kurd-red)"></i>
                <h2 id="current-title">Rudaw TV HD</h2>
            </div>
        </div>

        <!-- Sidebar Section -->
        <div class="sidebar-section">
            <div class="search-wrapper">
                <i class="fa-solid fa-magnifying-glass"></i>
                <input type="text" id="search" class="search-box" placeholder="ناڤێ کەنالی..." oninput="filterChannels()">
            </div>
            
            <div class="tabs-container">
                <div class="tab-item active" onclick="switchTab('all', this)">هەمی</div>
                <div class="tab-item" onclick="switchTab('kurd', this)">☀️ کوردستان</div>
                <div class="tab-item" onclick="switchTab('sport', this)">⚽ وەرزش & beIN</div>
                <div class="tab-item" onclick="switchTab('kids', this)">🧸 زارۆک</div>
                <div class="tab-item" onclick="switchTab('movie', this)">🎬 فلیم</div>
                <div class="tab-item" onclick="switchTab('user-added', this)">⭐ یێن گشتی (زێدەکری)</div>
            </div>

            <div id="loading-status" class="status-bar">چاوڕێبە... کەنال دهێنە ڕێکخستن</div>
            <div class="channel-grid" id="channel-box"></div>
        </div>
    </div>

    <script src="https://vjs.zencdn.net/7.20.3/video.js"></script>
    <script>
        // --- لێرەدا زانیارییەکانی فایەربەیسی خۆت دابنێ (Firebase Config) ---
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_PROJECT_ID.firebaseapp.com",
            databaseURL: "https://YOUR_PROJECT_ID-default-rtdb.firebaseio.com",
            projectId: "YOUR_PROJECT_ID",
            storageBucket: "YOUR_PROJECT_ID.appspot.com",
            messagingSenderId: "YOUR_SENDER_ID",
            appId: "YOUR_APP_ID"
        };
        // دەستپێکردنی فایەربەیس
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let player = null;
        let currentCategory = 'all';
        let allChannelsList = []; 
        let userChannelsList = []; // بۆ هەڵگرتنی ئەو کەناڵانەی هەمووان زیادی دەکەن
        let filteredList = [];

        const filterRules = {
            'sport': ['sport', 'bein', 'alkass', 'espn', 'arena', 'eurosport', 'football', 'ssc', 'koora'],
            'kids': ['kids', 'cartoon', 'disney', 'nickelodeon', 'spacetoon', 'zarok'],
            'movie': ['movie', 'cinema', 'action', 'drama', 'fox', 'mbc2', 'افلام']
        };

        function playLive(url, name, isYoutube) {
            document.getElementById('current-title').innerText = name;
            const container = document.getElementById('player-container');
            if(window.innerWidth <= 992) { window.scrollTo({ top: 0, behavior: 'smooth' }); }

            if (isYoutube) {
                if(player) { player.dispose(); player = null; }
                container.innerHTML = `<iframe id="yt-player" src="${url}?autoplay=1" allowfullscreen allow="autoplay"></iframe>`;
            } else {
                container.innerHTML = `<video id="live-player" class="video-js vjs-default-skin vjs-big-play-centered" controls preload="auto" width="100%" height="100%"><source src="${url}" type="application/x-mpegURL"></video>`;
                player = videojs('live-player'); player.play();
            }
        }

        function switchTab(catCode, btn) {
            currentCategory = catCode;
            document.querySelectorAll('.tab-item').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            filterChannels();
        }

        function filterChannels() {
            let query = document.getElementById('search').value.toLowerCase();
            
            // تێکەڵکردنی کەناڵە گشتیەکان و کەناڵە زێدەکراوەکانی فایەربەیس
            let combined = [...userChannelsList, ...allChannelsList];

            filteredList = combined.filter(ch => {
                let matchesCat = (currentCategory === 'all' || ch.type === currentCategory);
                let matchesSearch = ch.name.toLowerCase().includes(query);
                return matchesCat && matchesSearch;
            });
            renderOptimizedGrid();
        }

        function renderOptimizedGrid() {
            const box = document.getElementById('channel-box');
            box.innerHTML = ''; 
            let displayLimit = Math.min(filteredList.length, 150); 
            
            filteredList.slice(0, displayLimit).forEach(ch => {
                let dotClass = 'dot-global';
                let labelName = 'IPTV';

                if(ch.type === 'kurd') { dotClass = 'dot-kurd'; labelName = 'کوردستان'; }
                else if(ch.type === 'sport') { dotClass = 'dot-sport'; labelName = 'وەرزش'; }
                else if(ch.type === 'user-added') { dotClass = 'dot-user'; labelName = 'گشتی'; }

                const div = document.createElement('div');
                div.className = 'channel-card';
                div.innerHTML = `
                    <div class="channel-title">📺 ${ch.name}</div>
                    <div class="channel-badge">
                        ${labelName}
                        <span class="badge-dot ${dotClass}"></span>
                    </div>`;

                div.addEventListener('click', function() {
                    playLive(ch.url, ch.name, ch.isYoutube);
                });

                // تەنها ئەو کەسەی کەناڵەکەی داناوە یان ئەدمین دەتوانێت بیسڕێتەوە (بە کلیکی درێژ)
                if(ch.type === 'user-added') {
                    div.addEventListener('contextmenu', function(e) { e.preventDefault(); confirmDeleteChannel(ch.id, ch.name); });
                    let pressTimer;
                    div.addEventListener('touchstart', function() { pressTimer = setTimeout(() => confirmDeleteChannel(ch.id, ch.name), 1500); });
                    div.addEventListener('touchend', function() { clearTimeout(pressTimer); });
                }

                box.appendChild(div);
            });
            document.getElementById('loading-status').innerText = `کەنالێن بەردەست: ${filteredList.length}`;
        }

        // زێدەکرن بۆ ناو فایەربەیس (بۆ ئەوەی بۆ هەموو جیهان زیاد ببێت)
        function addNewChannelPrompt() {
            let name = prompt("ناڤێ کەناڵێ نوو بۆ هەموو کەسان:");
            if (!name) return;
            let url = prompt("لینکێ کەناڵی (m3u8 یان یوتیوب):");
            if (!url) return;

            let isYoutube = url.includes("youtube.com") || url.includes("youtu.be");
            if (isYoutube && !url.includes("embed/")) {
                let videoId = "";
                if (url.includes("v=")) videoId = url.split("v=")[1].split("&")[0];
                else if (url.includes("youtu.be/")) videoId = url.split("youtu.be/")[1].split("?")[0];
                if (videoId) url = `https://www.youtube.com/embed/${videoId}`;
            }

            let id = 'ch_' + Date.now(); 
            let newChannel = { id: id, type: 'user-added', name: name, url: url, isYoutube: isYoutube };
            
            // ناردن بۆ فایەربەیس
            db.ref('global_channels/' + id).set(newChannel);
        }

        function confirmDeleteChannel(id, name) {
            let ask = confirm(`🚨 دەتەوێت کەناڵی "${name}" بۆ هەموو کەسێک بسڕیتەوە؟`);
            if (ask) { db.ref('global_channels/' + id).remove(); }
        }

        // گۆڕینی کاتی ڕاستەوخۆ لەگەڵ فایەربەیس (هەرکەسێک زیادی بکات لای هەمووان خۆکارانە دێت)
        db.ref('global_channels/').on('value', (snapshot) => {
            userChannelsList = [];
            snapshot.forEach((childSnapshot) => {
                userChannelsList.push(childSnapshot.val());
            });
            filterChannels();
        });

        // لۆدکردنی کەناڵە جێگیرەکان
        fetch('https://iptv-org.github.io/iptv/index.m3u')
            .then(res => res.text())
            .then(data => {
                const lines = data.split('\n');
                let currentName = '';

                allChannelsList.push({ type: 'kurd', url: 'https://www.youtube.com/embed/yF8zNf-48g0', name: 'Rudaw TV HD', isYoutube: true });
                allChannelsList.push({ type: 'kurd', url: 'https://www.youtube.com/embed/n4_8LdY-p8M', name: 'Kurdistan 24', isYoutube: true });
                allChannelsList.push({ type: 'kurd', url: 'https://www.youtube.com/embed/hd_S3b8F_M0', name: 'Waar TV', isYoutube: true });

                for(let i=1; i<=16; i++) {
                    allChannelsList.push({ type: 'sport', url: `http://premium-stream-link/bein${i}.m3u8`, name: `beIN SPORTS ${i} HD`, isYoutube: false });
                }

                for (let i = 0; i < lines.length; i++) {
                    let line = lines[i].trim();
                    if (line.startsWith('#EXTINF:')) { currentName = line.split(',')[1] || ''; } 
                    else if (line.startsWith('http') && currentName) {
                        let lName = currentName.toLowerCase();
                        let detectedCat = 'global';
                        if(lName.includes('kurd') || lName.includes('rudaw') || lName.includes('kurdistan')) detectedCat = 'kurd';
                        else {
                            for (let key in filterRules) {
                                if (filterRules[key].some(kwd => lName.includes(kwd))) { detectedCat = key; break; }
                            }
                        }
                        if(!lName.includes('bein')) { allChannelsList.push({ type: detectedCat, url: line, name: currentName, isYoutube: false }); }
                        currentName = '';
                    }
                }
                filterChannels(); 
            });
    </script>
</body>
</html>
